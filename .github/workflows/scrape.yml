name: Daily Ranking Scrape

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true # Speeds up subsequent runs even more

      - name: Run Scraper with uv
        # 'uv run' will automatically handle dependencies if defined in the script
        run: uv run scrape_arena.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data/history.json
          git commit -m "Update rankings: $(date +'%Y-%m-%d')" || exit 0
          git push
