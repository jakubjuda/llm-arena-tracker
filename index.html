<!DOCTYPE html>
<html>
<head>
    <title>LLM Arena Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: system-ui; background: #f8fafc; padding: 2rem; color: #1e293b; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { font-size: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Model Ranking Trends (Elo Score)</h1>
        <canvas id="rankingChart" height="150"></canvas>
    </div>

    <script>
        async function loadData() {
            const res = await fetch('./data/history.json');
            const history = await res.json();

            const dates = history.map(d => d.date);
            const modelNames = [...new Set(history.flatMap(d => d.models.map(m => m.name)))].slice(0, 8);

            const datasets = modelNames.map((name, i) => ({
                label: name,
                data: history.map(day => {
                    const m = day.models.find(mod => mod.name === name);
                    return m ? m.score : null;
                }),
                borderColor: `hsl(${i * 45}, 70%, 50%)`,
                backgroundColor: 'transparent',
                tension: 0.3
            }));

            new Chart(document.getElementById('rankingChart'), {
                type: 'line',
                data: { labels: dates, datasets },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }
        loadData();
    </script>
</body>
</html>
